<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEM 4 IT</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="gpa-container">
        <div class="gpa-card">

            <h1>Semester 4 GPA Calculator</h1>

            <div class="subject-row">
                <label for="math">

                <select name="probstat" id="math">

                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="prml">
                    Pattern Recognition and Machine Learning
                </label>

                <select name="ML" id="prml">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dav">
                    Data Analytics And Visualisation
                </label>

                <select name="DS" id="dav">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="ic">
                    Indian Constitution
                </label>

                <select name="Indianc" id="ic">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="adsa">
                    Advanced Data Structures And Algorithm Analysis
                </label>

                <select name="DSA" id="adsa">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="spml">
                    Signal Processing For Machine Learning
                </label>

                <select name="SignalP" id="spml">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dcn">
                    Data Communication And Networks
                </label>

                <select name="DCAN" id="dcn">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="co">
                    Computer Organisation
                </label>

                <select name="Compo" id="co">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="adsalab">
                    Advanced Data Structures And Algorithm Analysis Laboratory
                </label>

                <select name="ADSA Lab" id="adsalab">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <button onclick="calculatefunc()">
                Submit!
            </button>

            <p id="ans"></p>

        </div>
    </div>

    <script>
        const itsem4_dict = {
            'Probability And Statistics': 4,
            'Pattern Recognition and Machine Learning': 3,
            'Data Analytics And Visualisation': 3,
            'Indian Constitution': 1,
            'Advanced Data Structures And Algorithm Analysis': 3,
            'Signal Processing For Machine Learning': 2,
            'Data Communication And Networks': 3,
            'Computer Organisation': 2,
            'Advanced Data Structures And Algorithm Analysis Laboratory': 1.5
        };

        function calculatefunc() {

            const math = document.getElementById("math");
            const math_val = parseInt(math.value, 10);

            const prml = document.getElementById("prml");
            const prml_val = parseInt(prml.value, 10);

            const dav = document.getElementById("dav");
            const dav_val = parseInt(dav.value, 10);

            const ic = document.getElementById("ic");
            const ic_val = parseInt(ic.value, 10);

            const adsa = document.getElementById("adsa");
            const adsa_val = parseInt(adsa.value, 10);

            const spml = document.getElementById("spml");
            const spml_val = parseInt(spml.value, 10);

            const dcn = document.getElementById("dcn");
            const dcn_val = parseInt(dcn.value, 10);

            const co = document.getElementById("co");
            const co_val = parseInt(co.value, 10);

            const adsalab = document.getElementById("adsalab");
            const adsalab_val = parseInt(adsalab.value, 10);

            const grades = [
                math_val,
                prml_val,
                dav_val,
                ic_val,
                adsa_val,
                spml_val,
                dcn_val,
                co_val,
                adsalab_val
            ];

            let total_creds = 0;
            let num_creds_rec = 0;
            let i = 0;

            Object.values(itsem4_dict).forEach(function (value) {
                total_creds += value;
                num_creds_rec += grades[i] * value;
                i++;
            });

            let gpa = num_creds_rec / total_creds;

            const myele = document.getElementById("ans");
            myele.innerText = "Your GPA is: " + gpa.toFixed(3);
        }
    </script>

</body>

</html>
