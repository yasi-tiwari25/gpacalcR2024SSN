<script>
    const itsem1_dict={'prob and stat':4,'prml':3,'dav':3,'ic':1,'adsa':3,'spml':2,'dcn':3,'co': 2,'adsalab':1.5};
    const grades={'O':10,'A+':9,'A':8,'B+':7,'B':6,'C':5,'U':0};
    function calculatefunc(){
        const math = document.getElementById("math");
        const math_val = parseInt(math.value,10)

        const prml = document.getElementById("prml");
        const prml_val = parseInt(prml.value,10)

        const dav = document.getElementById("dav");
        const dav_val = parseInt(dav.value , 10);

        const ic = document.getElementById("ic");
        const ic_val = parseInt(ic.value , 10);

        const adsalab= document.getElementById("adsalab");
        const adsalab_val = parseInt(adsalab.value , 10);

        const adsa = document.getElementById("adsa");
        const adsa_val = parseInt(adsa.value , 10);

        const spml = document.getElementById("spml");
        const spml_val = parseInt(spml.value , 10);

        const dcn = document.getElementById("dcn");
        const dcn_val = parseInt(dcn.value , 10);

        const co = document.getElementById("co");
        const co_val = parseInt(co.value , 10);

        const grades = new Array(math_val , prml_val , dav_val , ic_val , adsa_val , spml_val , dcn_val , co_val , adsalab_val);
        
        let total_creds = 0 ;
        let num_creds_rec = 0 ;
        let i = 0;
        Object.values(itsem1_dict).forEach(function(value,key){
            total_creds += value;
            num_creds_rec += grades[i] * value;
            i++;
        });
        let cgpa = num_creds_rec/total_creds;
        const myele = document.getElementById("ans");
        myele.innerText = "Your cgpa is :" + cgpa.toFixed(3);
    }
</script>
