<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEM 3 IT</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="gpa-container">
        <div class="gpa-card">

            <h1>Semester 3 GPA Calculator</h1>

            <div class="subject-row">
                <label for="math">
                    Mathematical Foundations for Computing Technologies
                </label>

                <select name="discrete maths" id="math">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="uhv">
                    Universal Human Values 2 : Understanding Harmony
                </label>

                <select name="UHV2" id="uhv">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="oops">
                    Object Oriented Programming Using Java
                </label>

                <select name="oopjava" id="oops">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dbt">
                    Database Technology
                </label>

                <select name="Database" id="dbt">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="psep">
                    Principles Of Software Engineering and Practices
                </label>

                <select name="princi" id="psep">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dtie">
                    Design Thinking, Innovation and Entrepreneurship
                </label>

                <select name="die" id="dtie">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dsmd">
                    Digital Systems and Microprocessor Design
                </label>

                <select name="mpmc" id="dsmd">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dc">
                    Introduction to Digital Communication
                </label>

                <select name="Introdc" id="dc">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dblab">
                    Database Technology Laboratory
                </label>

                <select name="DB Lab" id="dblab">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <button onclick="calculatefunc()">
                Submit!
            </button>

            <p id="ans"></p>

        </div>
    </div>

    <script>
        const itsem3_dict = {
            'Mathematical Foundations for Computing Technologies': 3,
            'Universal Human Values 2': 3,
            'Object Oriented Programming Using Java': 3,
            'Database Technology': 3,
            'Principles Of Software Engineering and Practices': 2,
            'Design Thinking, Innovation and Entrepreneurship': 3,
            'Digital Systems and Microprocessor Design': 3,
            'Introduction to Digital Communication': 2,
            'Database Technology Laboratory': 1.5
        };

        function calculatefunc() {

            const math = document.getElementById("math");
            const math_val = parseInt(math.value, 10);

            const uhv = document.getElementById("uhv");
            const uhv_val = parseInt(uhv.value, 10);

            const oops = document.getElementById("oops");
            const oops_val = parseInt(oops.value, 10);

            const dbt = document.getElementById("dbt");
            const dbt_val = parseInt(dbt.value, 10);

            const psep = document.getElementById("psep");
            const psep_val = parseInt(psep.value, 10);

            const dtie = document.getElementById("dtie");
            const dtie_val = parseInt(dtie.value, 10);

            const dsmd = document.getElementById("dsmd");
            const dsmd_val = parseInt(dsmd.value, 10);

            const dc = document.getElementById("dc");
            const dc_val = parseInt(dc.value, 10);

            const dblab = document.getElementById("dblab");
            const dblab_val = parseInt(dblab.value, 10);

            const grades = [
                math_val,
                uhv_val,
                oops_val,
                dbt_val,
                psep_val,
                dtie_val,
                dsmd_val,
                dc_val,
                dblab_val
            ];

            let total_creds = 0;
            let num_creds_rec = 0;
            let i = 0;

            Object.values(itsem3_dict).forEach(function (value) {
                total_creds += value;
                num_creds_rec += grades[i] * value;
                i++;
            });

            let gpa = num_creds_rec / total_creds;

            const myele = document.getElementById("ans");
            myele.innerText = "Your GPA is: " + gpa.toFixed(3);
        }
    </script>

</body>

</html>
