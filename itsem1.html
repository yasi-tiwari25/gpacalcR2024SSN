<script>
    const itsem1_dict={'Communicative English':3,'Algebra and Calculus for Engineers':4,'Engineering Physics':4,'Engineering Chemistry':4,'Problem Solving and Programming in Python':3,'Engineering Graphics':3,'Heritage of Tamils':1};
    const grades={'O':10,'A+':9,'A':8,'B+':7,'B':6,'C':5,'U':0};
    function calculatefunc(){
        const ce = document.getElementById("ce");
        const ce_val = parseInt(ce.value,10)

        const math = document.getElementById("ace");
        const ace_val = parseInt(math.value,10)

        const phy = document.getElementById("ep");
        const phy_val = parseInt(phy.value , 10);

        const chem = document.getElementById("ec");
        const chem_val = parseInt(chem.value , 10);

        const python = document.getElementById("py");
        const py_val = parseInt(python.value , 10);

        const eg = document.getElementById("eg");
        const eg_val = parseInt(eg.value , 10);

        const tamil = document.getElementById("tams");
        const tamil_val = parseInt(tamil.value , 10);

        const grades = new Array(ce_val , ace_val , phy_val , chem_val , py_val , eg_val , tamil_val);
        
        let total_creds = 0 ;
        let num_creds_rec = 0 ;
        let i = 0;
        Object.values(itsem1_dict).forEach(function(value,key){
            total_creds += value;
            num_creds_rec += grades[i] * value;
            i++;
        });
        let cgpa = num_creds_rec/total_creds;
        const myele = document.getElementById("ans");
        myele.innerText = "Your cgpa is :" + cgpa;
    }
</script>
