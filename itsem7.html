<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEM 7 IT</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="gpa-container">
        <div class="gpa-card">

            <h1>Semester 7 GPA Calculator</h1>

            <div class="subject-row">
                <label for="ncs">
                    Network and Communication Security
                </label>

                <select name="Network Security" id="ncs">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="ai">
                    Artificial Intelligence
                </label>

                <select name="Artificial Intelligence" id="ai">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="pe3">
                    Professional Elective III
                </label>

                <select name="Professional Elective 3" id="pe3">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="pe4">
                    Professional Elective IV
                </label>

                <select name="Professional Elective 4" id="pe4">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="pe5">
                    Professional Elective V
                </label>

                <select name="Professional Elective 5" id="pe5">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="project1">
                    Project Work – Phase 1
                </label>

                <select name="Project Work Phase 1" id="project1">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="internship">
                    Industrial Training / Internship
                </label>

                <select name="Internship" id="internship">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <button onclick="calculatefunc()">
                Submit!
            </button>

            <p id="ans"></p>

        </div>
    </div>

    <script>
        const itsem7_dict = {
            'Network and Communication Security': 3,
            'Artificial Intelligence': 3,
            'Professional Elective III': 3,
            'Professional Elective IV': 3,
            'Professional Elective V': 3,
            'Project Work – Phase 1': 3,
            'Industrial Training / Internship': 2
        };

        function calculatefunc() {

            const ncs_val = parseInt(document.getElementById("ncs").value, 10);
            const ai_val = parseInt(document.getElementById("ai").value, 10);
            const pe3_val = parseInt(document.getElementById("pe3").value, 10);
            const pe4_val = parseInt(document.getElementById("pe4").value, 10);
            const pe5_val = parseInt(document.getElementById("pe5").value, 10);
            const project1_val = parseInt(document.getElementById("project1").value, 10);
            const internship_val = parseInt(document.getElementById("internship").value, 10);

            const grades = [
                ncs_val,
                ai_val,
                pe3_val,
                pe4_val,
                pe5_val,
                project1_val,
                internship_val
            ];

            let total_creds = 0;
            let num_creds_rec = 0;
            let i = 0;

            Object.values(itsem7_dict).forEach(function (value) {
                total_creds += value;
                num_creds_rec += grades[i] * value;
                i++;
            });

            let gpa = num_creds_rec / total_creds;

            const myele = document.getElementById("ans");
            myele.innerText = "Your GPA is: " + gpa.toFixed(3);
        }
    </script>

</body>

</html>
