<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEM 2 IT</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="gpa-container">
        <div class="gpa-card">

            <h1>Semester 2 GPA Calculator</h1>

            <div class="subject-row">
                <label for="calc">
                    Calculus of Vectors, Complex Functions and Laplace Transforms
                </label>

                <select name="Calc Vect" id="calc">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="beee">
                    Basic Electrical and Electronics Engineering
                </label>

                <select name="BEEE" id="beee">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="progc">
                    Programming in C and Data Structures
                </label>

                <select name="C and DS" id="progc">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="evs">
                    Environmental Science
                </label>

                <select name="Envi Sci" id="evs">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="hume">
                    Humanities Elective
                </label>

                <select name="Elective" id="hume">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="web">
                    Introduction to Web Programming
                </label>

                <select name="Web Progg" id="web">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="tams">
                    Tamils and Technology
                </label>

                <select name="Tamils and Techs" id="tams">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="dtep">
                    Design Thinking and Engineering Practices Laboratory
                </label>

                <select name="dtep lab" id="dtep">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <div class="subject-row">
                <label for="sdp">
                    Software Development Project
                </label>

                <select name="SDP Lab" id="sdp">
                    <option value="10">O</option>
                    <option value="9">A+</option>
                    <option value="8">A</option>
                    <option value="7">B+</option>
                    <option value="6">B</option>
                    <option value="5">C</option>
                    <option value="0">U</option>
                </select>
            </div>

            <button onclick="calculatefunc()">
                Submit!
            </button>

            <p id="ans"></p>

        </div>
    </div>

    <script>
        const itsem2_dict = {
            'Calculus of Vectors, Complex Functions and Laplace Transforms': 4,
            'Basic Electrical and Electronics Engineering': 3,
            'Programming in C and Data Structures': 3,
            'Environmental Science': 1,
            'Humanities Elective': 3,
            'Introduction to Web Programming': 3,
            'Tamils and Technology': 1,
            'Design Thinking and Engineering Practices Laboratory': 1.5,
            'Software Development Project': 3.5
        };

        function calculatefunc() {

            const calc = document.getElementById("calc");
            const calc_val = parseInt(calc.value, 10);

            const beee = document.getElementById("beee");
            const beee_val = parseInt(beee.value, 10);

            const progc = document.getElementById("progc");
            const progc_val = parseInt(progc.value, 10);

            const evs = document.getElementById("evs");
            const evs_val = parseInt(evs.value, 10);

            const hume = document.getElementById("hume");
            const hume_val = parseInt(hume.value, 10);

            const web = document.getElementById("web");
            const web_val = parseInt(web.value, 10);

            const tamil = document.getElementById("tams");
            const tamil_val = parseInt(tamil.value, 10);

            const dtep = document.getElementById("dtep");
            const dtep_val = parseInt(dtep.value, 10);

            const sdp = document.getElementById("sdp");
            const sdp_val = parseInt(sdp.value, 10);

            const grades = [
                calc_val,
                beee_val,
                progc_val,
                evs_val,
                hume_val,
                web_val,
                tamil_val,
                dtep_val,
                sdp_val
            ];

            let total_creds = 0;
            let num_creds_rec = 0;
            let i = 0;

            Object.values(itsem2_dict).forEach(function (value) {
                total_creds += value;
                num_creds_rec += grades[i] * value;
                i++;
            });

            let gpa = num_creds_rec / total_creds;

            const myele = document.getElementById("ans");
            myele.innerText = "Your GPA is: " + gpa.toFixed(3);
        }
    </script>

</body>

</html>
